name: Selenium Regression Tests

on:
  push:
    # Se activa al subir código a cualquiera de estas dos ramas
    branches: [ main, master ]

  # PERMITE EJECUTARLO MANUALMENTE (Esto hace que aparezca el botón en la web)
  workflow_dispatch:

  schedule:
    # Se corre automáticamente todas las noches a las 00:00 UTC
    - cron: '0 0 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Tests con Pytest
      run: |
        # Ejecutamos los tests y generamos los resultados para Allure
        pytest --alluredir=allure-results
      continue-on-error: true

    - name: Generar Reporte Allure
      uses: simple-elf/allure-report-action@master
      if: always() # Se ejecuta aunque los tests fallen
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20 # Mantiene los últimos 20 reportes históricos

    - name: Publicar Reporte en GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-history